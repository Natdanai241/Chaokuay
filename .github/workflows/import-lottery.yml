name: Import lottery draw

on:
  schedule:
    - cron: '0 13 1,16 * *'   # 20:00 ICT on the 1st and 16th
  workflow_dispatch: {}

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/import-draw.js
        env:
          SUPABASE_URL: https://aaphdwailaktncopxnrp.supabase.co
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
